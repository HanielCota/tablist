name: Build

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build & test (Java 25)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '25'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build, test & verify formatting
        run: ./gradlew build --no-daemon --stacktrace

      - name: Assemble plugin jar
        run: ./gradlew :tablist-paper:shadowJar --no-daemon

      - name: Upload plugin jar
        uses: actions/upload-artifact@v4
        with:
          name: tablist-plugin
          path: tablist-paper/build/libs/*-all.jar
          if-no-files-found: error
